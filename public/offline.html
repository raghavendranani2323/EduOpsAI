<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Offline — EduOps AI</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; color: #0f172a; padding: 24px; }
  .card { max-width: 360px; text-align: center; }
  h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
  p { color: #64748b; margin: 0 0 1rem; font-size: 0.875rem; }
  button { background: oklch(58% 0.21 264); color: #fff; border: 0; padding: 0.75rem 1rem; border-radius: 0.75rem; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>EduOps AI couldn't reach the server. Some cached pages are still available.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
